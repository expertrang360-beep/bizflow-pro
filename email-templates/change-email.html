<!--
  BizFlow — Email Change Confirmation
  Paste into: Supabase Dashboard → Authentication → Email Templates → "Change Email Address"
  Subject: Confirm your new BizFlow email
-->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/></head>
<body style="margin:0;padding:0;background:#f4f6fb;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:#0f172a;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#f4f6fb;padding:32px 16px;"><tr><td align="center">
    <table role="presentation" width="560" cellpadding="0" cellspacing="0" style="max-width:560px;background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 4px 24px rgba(15,23,42,0.06);">
      <tr><td style="background:linear-gradient(135deg,#2563eb 0%,#1e40af 100%);padding:32px;text-align:center;">
        <div style="display:inline-block;width:56px;height:56px;background:rgba(255,255,255,0.18);border-radius:14px;line-height:56px;font-size:28px;color:#fff;font-weight:700;">B</div>
        <h1 style="margin:16px 0 0;color:#fff;font-size:22px;font-weight:600;">BizFlow</h1>
      </td></tr>
      <tr><td style="padding:36px;">
        <h2 style="margin:0 0 12px;font-size:22px;color:#0f172a;font-weight:600;">Confirm your new email</h2>
        <p style="margin:0 0 20px;font-size:15px;line-height:1.6;color:#475569;">
          You requested to change the email address on your BizFlow account from <strong>{{ .Email }}</strong> to <strong>{{ .NewEmail }}</strong>. Click below to confirm.
        </p>
        <table role="presentation" cellpadding="0" cellspacing="0" style="margin:24px 0;"><tr><td style="border-radius:10px;background:#2563eb;">
          <a href="{{ .ConfirmationURL }}" style="display:inline-block;padding:14px 28px;color:#fff;text-decoration:none;font-weight:600;font-size:15px;border-radius:10px;">Confirm new email</a>
        </td></tr></table>
        <p style="margin:0;font-size:13px;color:#94a3b8;">If you didn't request this change, please contact support immediately.</p>
      </td></tr>
      <tr><td style="padding:20px 36px 32px;border-top:1px solid #e2e8f0;text-align:center;">
        <p style="margin:0;font-size:12px;color:#94a3b8;">© BizFlow · <a href="{{ .SiteURL }}" style="color:#94a3b8;text-decoration:underline;">{{ .SiteURL }}</a></p>
      </td></tr>
    </table>
  </td></tr></table>
</body></html>
